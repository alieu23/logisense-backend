name: Deploy Backend (Docker) to EC2

on:
  push:
    branches:
      - main


jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 18.219.19.141
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd logisense-backend

            # Ensure latest code
            git fetch origin
            git reset --hard origin/main

            # Stop and remove old container
            docker stop logisense || true
            docker rm logisense || true

            # Build new image
            docker build -t logisense-backend .

            # Run new container

            docker run -d -p 8000:8000 \
              --name logisense \
              --restart always \
              -e AWS_DEFAULT_REGION=us-east-2 \
              logisense-backend